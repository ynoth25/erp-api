name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: aws-actions/setup-sam@v2

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Install dependencies
        run: npm ci

      - name: Run DB migrations
        env:
          DSQL_HOST: ${{ secrets.DSQL_HOST }}
          DSQL_REGION: ap-northeast-1
          DSQL_USER: admin
          DSQL_DATABASE: postgres
        run: npx tsx scripts/migrate-safe.ts --force-reset

      - name: Build
        run: node scripts/sam-build.mjs

      - name: Deploy
        run: |
          OVERRIDES="FunctionName=erp-api"
          OVERRIDES+=" DsqlHost=${{ secrets.DSQL_HOST }}"
          OVERRIDES+=" DsqlRegion=ap-northeast-1"
          OVERRIDES+=" DsqlUser=admin"
          OVERRIDES+=" DsqlDatabase=postgres"
          OVERRIDES+=" DsqlClusterArn=${{ secrets.DSQL_CLUSTER_ARN }}"
          OVERRIDES+=" ApiKeys=${{ secrets.API_KEYS }}"
          if [ -n "${{ secrets.ALLOWED_ORIGINS }}" ]; then
            OVERRIDES+=" AllowedOrigins=${{ secrets.ALLOWED_ORIGINS }}"
          fi

          sam deploy \
            --template-file .aws-sam/build/template.yaml \
            --stack-name erp-api \
            --resolve-s3 \
            --s3-prefix erp-api \
            --region ap-northeast-1 \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --force-upload \
            --parameter-overrides $OVERRIDES
