AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: ERP API - Node.js TypeScript Lambda with HTTP API + Aurora DSQL

Parameters:
  FunctionName:
    Type: String
    Default: erp-api
    Description: Name of the Lambda function
  DsqlHost:
    Type: String
    Description: Aurora DSQL cluster host (e.g. mycluster.dsql.ap-northeast-1.on.aws)
  DsqlRegion:
    Type: String
    Description: AWS region of the DSQL cluster (e.g. ap-northeast-1)
  DsqlUser:
    Type: String
    Default: admin
    Description: DSQL database user (admin uses DbConnectAdmin token)
  DsqlDatabase:
    Type: String
    Default: postgres
    Description: DSQL database name
  DsqlClusterArn:
    Type: String
    Description: DSQL cluster ARN (e.g. arn:aws:dsql:ap-northeast-1:123456789012:cluster/abc)

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    MemorySize: 256
    Architectures:
      - x86_64

Resources:
  # CloudWatch log group — 1 day retention
  ApiFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${FunctionName}"
      RetentionInDays: 1

  # HTTP API (API Gateway v2) — $1/million requests, no base charge
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        AllowHeaders:
          - "*"

  # Lambda function
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Ref FunctionName
      Handler: index.handler
      CodeUri: ./
      Description: ERP API HTTP handler
      Environment:
        Variables:
          DSQL_HOST: !Ref DsqlHost
          DSQL_USER: !Ref DsqlUser
          DSQL_DATABASE: !Ref DsqlDatabase
          DSQL_REGION: !Ref DsqlRegion
          DSQL_PORT: "5432"
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - dsql:DbConnect
                - dsql:DbConnectAdmin
              Resource: !Ref DsqlClusterArn
      LoggingConfig:
        LogGroup: !Ref ApiFunctionLogGroup
      Events:
        CatchAll:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /{proxy+}
            Method: ANY
        Root:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /
            Method: ANY
    DependsOn: ApiFunctionLogGroup
    Metadata:
      BuildMethod: makefile

Outputs:
  ApiEndpoint:
    Description: HTTP API endpoint URL
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  ApiFunctionArn:
    Description: ARN of the API Lambda function
    Value: !GetAtt ApiFunction.Arn
