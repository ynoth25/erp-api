AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: ERP API - Node.js TypeScript Lambda with Function URL + Aurora DSQL

Parameters:
  FunctionName:
    Type: String
    Default: erp-api
    Description: Name of the Lambda function
  DsqlHost:
    Type: String
    Description: Aurora DSQL cluster host (e.g. mycluster.dsql.ap-northeast-1.on.aws)
  DsqlRegion:
    Type: String
    Description: AWS region of the DSQL cluster (e.g. ap-northeast-1)
  DsqlUser:
    Type: String
    Default: admin
    Description: DSQL database user (admin uses DbConnectAdmin token)
  DsqlDatabase:
    Type: String
    Default: postgres
    Description: DSQL database name
  DsqlClusterArn:
    Type: String
    Description: DSQL cluster ARN (e.g. arn:aws:dsql:ap-northeast-1:123456789012:cluster/abc)
  ApiKeys:
    Type: String
    NoEcho: true
    Description: Comma-separated API keys that clients must send in x-api-key header
  AllowedOrigins:
    Type: String
    Default: ""
    Description: Comma-separated allowed origins for CORS (e.g. https://myapp.com,http://localhost:3001)


Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    MemorySize: 256
    Architectures:
      - x86_64

Resources:
  # ─── Cognito User Pool (free up to 50K MAU) ───────────
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "${FunctionName}-users"
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true
        - Name: name
          AttributeDataType: String
          Required: false
          Mutable: true
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireUppercase: true
          RequireNumbers: true
          RequireSymbols: false
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1

  # App client for web + mobile (no client secret — public client for SPA/mobile)
  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "${FunctionName}-app"
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED
      AccessTokenValidity: 1
      IdTokenValidity: 1
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days

  # CloudWatch log group — 1 day retention
  ApiFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${FunctionName}"
      RetentionInDays: 1

  # Lambda function with Function URL (free — no API Gateway cost)
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Ref FunctionName
      Handler: index.handler
      CodeUri: ./
      Description: ERP API HTTP handler
      Environment:
        Variables:
          DSQL_HOST: !Ref DsqlHost
          DSQL_USER: !Ref DsqlUser
          DSQL_DATABASE: !Ref DsqlDatabase
          DSQL_REGION: !Ref DsqlRegion
          DSQL_PORT: "5432"
          API_KEYS: !Ref ApiKeys
          ALLOWED_ORIGINS: !Ref AllowedOrigins
          COGNITO_USER_POOL_ID: !Ref UserPool
          COGNITO_CLIENT_ID: !Ref UserPoolClient
          COGNITO_REGION: !Ref AWS::Region
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - dsql:DbConnect
                - dsql:DbConnectAdmin
              Resource: !Ref DsqlClusterArn
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: BUFFERED
        Cors:
          AllowOrigins:
            - "*"
          AllowMethods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
          AllowHeaders:
            - content-type
            - x-api-key
            - x-device-key
            - authorization
          MaxAge: 86400
    DependsOn: ApiFunctionLogGroup

Outputs:
  ApiFunctionUrl:
    Description: Lambda Function URL (free, no API Gateway)
    Value: !GetAtt ApiFunctionUrl.FunctionUrl
  ApiFunctionArn:
    Description: ARN of the API Lambda function
    Value: !GetAtt ApiFunction.Arn
  CognitoUserPoolId:
    Description: Cognito User Pool ID (use in mobile/web app SDK config)
    Value: !Ref UserPool
  CognitoClientId:
    Description: Cognito App Client ID (use in mobile/web app SDK config)
    Value: !Ref UserPoolClient
  CognitoRegion:
    Description: Cognito region
    Value: !Ref AWS::Region
